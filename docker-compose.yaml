version: '3.8'

services:
  auth-db:
    image: postgres:15-alpine
    container_name: auth_db_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: auth_db
    ports:
      - '5432:5432'
    volumes:
      - auth_db_data:/var/lib/postgresql/data

volumes:
  auth_db_data:
